project:
  type: book
  output-dir: _book

book:
  title: "MRI Physics"
  subtitle: "磁共振成像物理学基础"
  author: "MRI Physics Contributors"
  date: today
  date-format: "YYYY-MM-DD"
  search: true
  repo-url: https://github.com/wyd1216/mri-physics
  repo-actions: [edit, issue]
  sharing: [twitter, facebook]
  chapters:
    - index.qmd
    - part: "核心理论"
      chapters:
        - chapters/01-hydrogen-proton/hydrogen-proton.qmd
        - chapters/02-basics/basics.qmd
        - chapters/03-sequences/sequences.qmd
    - references.qmd

bibliography: references.bib
csl: _assets/ieee.csl

format:
  html:
    theme:
      light: [cosmo, _assets/custom.scss]
    fontsize: 1.0em
    linestretch: 1.55
    mainfont: "Charter, 'Songti SC', 'Noto Serif CJK SC', Georgia, serif"
    grid:
      sidebar-width: 250px
      body-width: 750px
      margin-width: 350px
    toc: true
    toc-depth: 3
    number-sections: true
    number-depth: 3
    code-tools: true
    code-fold: true
    code-summary: "Show code"
    highlight-style: github
    link-citations: true
    reference-location: margin
    citation-location: margin
    cap-location: margin

  pdf:
    pdf-engine: xelatex
    documentclass: tufte-book
    classoption:
      - nobib          # let Quarto/Pandoc handle bibliography
      - notoc          # let Quarto handle TOC
      - justified      # full justification
    papersize: a4
    fontsize: 10pt
    toc: true
    toc-depth: 3
    number-sections: true
    link-citations: true
    mainfont: "Charter"
    sansfont: "Optima"
    monofont: "Menlo"
    CJKmainfont: "Songti SC"
    CJKsansfont: "PingFang SC"
    CJKmonofont: "Menlo"
    colorlinks: true
    include-in-header:
      text: |
        % ── Mark marginnote/sidenotes as loaded (tufte-book defines them) ──
        \makeatletter
        \@namedef{ver@marginnote.sty}{2024/01/01}
        \@namedef{ver@sidenotes.sty}{2024/01/01}
        \makeatother
        \usepackage{xeCJK}
        \setCJKmainfont{Songti SC}[BoldFont=Heiti SC, BoldFeatures={Scale=1.08}, ItalicFont=Kaiti SC, ItalicFeatures={Scale=1.02}]
        \setCJKsansfont{PingFang SC}
        \setCJKmonofont{Menlo}
        \usepackage{ragged2e}
        % ── Pre-define \subtitle as no-op so Pandoc's \providecommand is skipped ──
        \newcommand{\subtitle}[1]{}
        % ── Redefine maketitle for CJK ──
        \makeatletter
        \renewcommand{\maketitle}{%
          \newpage
          \global\@topnum\z@
          \begingroup
            \setlength{\parindent}{0pt}%
            \setlength{\parskip}{4pt}%
            {\LARGE\itshape\@title\par}%
            {\Large\itshape 磁共振成像物理学基础\par}%
            {\Large\itshape\@author\par}%
            {\Large\itshape\@date\par}%
          \endgroup
          \thispagestyle{plain}%
          \tuftebreak
          \@afterindentfalse\@afterheading
        }
        \makeatother
        % ── Fix running headers: disable allcaps/smallcaps (breaks CJK) ──
        \renewcommand{\allcaps}[1]{#1}
        \renewcommand{\smallcaps}[1]{#1}

execute:
  freeze: auto

lang: zh
