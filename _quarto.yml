project:
  type: book
  output-dir: _book

book:
  title: "MRI Physics"
  subtitle: "磁共振成像物理学基础"
  author: "MRI Physics Contributors"
  date: today
  date-format: "YYYY-MM-DD"
  search: true
  repo-url: https://github.com/wyd1216/mri-physics
  repo-actions: [edit, issue]
  sharing: [twitter, facebook]
  chapters:
    - index.qmd
    - part: "核心理论"
      chapters:
        - chapters/01-hydrogen-proton/hydrogen-proton.qmd
        - chapters/02-basics/basics.qmd
        - chapters/03-sequences/sequences.qmd
    - references.qmd

bibliography: references.bib
csl: _assets/ieee.csl

format:
  html:
    theme:
      light: [cosmo, _assets/custom.scss]
    fontsize: 1.1em
    linestretch: 1.6
    mainfont: "Charter, 'Songti SC', 'Noto Serif CJK SC', Georgia, serif"
    grid:
      sidebar-width: 250px
      body-width: 750px
      margin-width: 350px
    toc: true
    toc-depth: 3
    number-sections: true
    number-depth: 3
    code-tools: true
    code-fold: true
    code-summary: "Show code"
    highlight-style: github
    link-citations: true
    reference-location: margin
    citation-location: margin
    cap-location: margin

  pdf:
    pdf-engine: xelatex
    documentclass: scrbook
    papersize: a4
    fontsize: 10pt
    geometry:
      - top=2.5cm
      - bottom=2.5cm
      - left=2.5cm
      - right=6.5cm
      - marginparwidth=4.5cm
      - marginparsep=0.5cm
    toc: true
    toc-depth: 3
    number-sections: true
    link-citations: true
    mainfont: "Charter"
    sansfont: "Optima"
    monofont: "Menlo"
    CJKmainfont: "Songti SC"
    CJKsansfont: "PingFang SC"
    CJKmonofont: "Menlo"
    colorlinks: true
    include-in-header:
      text: |
        \usepackage{xeCJK}
        \setCJKmainfont{Songti SC}[BoldFont=Heiti SC, BoldFeatures={Scale=1.08}, ItalicFont=Kaiti SC, ItalicFeatures={Scale=1.02}]
        \setCJKsansfont{PingFang SC}
        \setCJKmonofont{Menlo}
        \usepackage{ragged2e}
        \let\oldmarginpar\marginpar
        \renewcommand{\marginpar}[1]{\oldmarginpar{\RaggedRight #1}}
        % ── Heading font sizes (KOMA-Script) ──
        \RedeclareSectionCommand[font=\Large\bfseries\sffamily]{chapter}
        \RedeclareSectionCommand[font=\large\bfseries\sffamily]{section}
        \RedeclareSectionCommand[font=\normalsize\bfseries\sffamily]{subsection}
        \RedeclareSectionCommand[font=\normalsize\sffamily]{subsubsection}
        % ── Body line spacing ──
        \usepackage{setspace}
        \setstretch{1.3}

execute:
  freeze: auto

lang: zh
